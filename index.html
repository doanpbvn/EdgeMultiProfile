<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body style="max-width: 360px; margin: 6px auto;">
    <textarea id="input" style="width: 100%; min-height: 100px; padding: 12px;box-sizing: border-box;"></textarea>
    <button id="btn" style="width: 100%; padding: 12px;">Generate</button>
    <div id="qrcode" style="display: flex; justify-content: space-around; margin-top: 12px;"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const input = document.getElementById("input");
    const box = document.getElementById("qrcode");
    btn.onclick = () => {
      const text = input.value.trim();
      if (!text) return;
      const sms = `sms:&body=${encodeURIComponent(text)}`;
      box.innerHTML = "";
      new QRCode(box, { text: sms });
    };
  </script>
</body>
</html>

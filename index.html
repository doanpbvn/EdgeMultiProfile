<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body style="max-width: 360px; margin: 6px auto;">
    <textarea id="input" style="width: 100%; min-height: 100px; padding: 12px;box-sizing: border-box;"></textarea>
    <button id="btn" style="width: 100%; padding: 12px;">Generate</button>
    <div id="qrcode"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const input = document.getElementById("input");
    const box = document.getElementById("qrcode");
    btn.onclick = () => {
      let text = input.value.trim();
      text && (box.innerHTML = "", new QRCode(box, { text }));
    };
  </script>
</body>
</html>

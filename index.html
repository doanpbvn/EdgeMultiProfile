<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6fb; padding: 24px; }
    .card { max-width: 560px; margin: 0 auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; box-shadow: 0 8px 24px rgba(15,23,42,.08); }
    textarea { width: 100%; min-height: 120px; padding: 16px; border: 1px solid #e2e8f0; border-radius: 12px; font: inherit; resize: vertical; }
    textarea:focus { outline: none; border-color: #2563eb; }
    button { width: 100%; margin-top: 16px; padding: 12px 24px; border: none; border-radius: 12px; background: #2563eb; color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
    #qr { margin-top: 24px; text-align: center; display: none; }
    #qr.show { width:90%; display: block; }
    #qrcode { display: inline-block; padding: 16px; border: 1px solid #e2e8f0; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <textarea id="input" placeholder="Enter text to copy..." maxlength="2000"></textarea>
    <button id="btn">Generate QR</button>
    <div id="qr"><div id="qrcode"></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const input = document.getElementById("input");
    const qr = document.getElementById("qr");
    const box = document.getElementById("qrcode");

    document.getElementById("btn").onclick = () => {
      const text = input.value.trim();
      if (!text) return;
      box.innerHTML = "";
      new QRCode(box, { text, width: 240, height: 240, colorDark: "#0f172a", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M });
      qr.classList.add("show");
    };
  </script>
</body>
</html>
